<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gửi tặng em 8/3</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0b0b0b;
            overflow: hidden; /* Ngăn cuộn trang lung tung */
        }

        .flower-main {
            width: 50%; /* Cho bó hoa to vừa phải trên điện thoại */
            max-width: 200px;
            height: auto;
        }

    .container {
    text-align: center;
    z-index: 2;
    }

    /* Hiệu ứng chữ phát sáng */
    h1 {
    color: #ff69b4;
    text-shadow: 0 0 10px #ff1493, 0 0 20px #ff1493;
    font-size: 1.8rem;
    margin-bottom: 20px;
    animation: fadeIn 2s ease-in;
    }

    /* Bó hoa chính */
    .flower-main {
    width: 180px;
    cursor: pointer;
    transition: transform 0.5s;
    filter: drop-shadow(0 0 10px rgba(255, 105, 180, 0.5));
    }

    .flower-main:hover {
    transform: scale(1.1) rotate(5deg);
    }

    /* Popup hiện ảnh */
    .modal {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 255, 255, 0.95);
    padding: 15px;
    border-radius: 20px;
    box-shadow: 0 0 30px #ff69b4;
    width: 80%;
    max-width: 350px;
    text-align: center;
    color: #333;
    z-index: 100;
    animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 10px;
    }

    .modal h2 { color: #d63384; margin: 10px 0; }

    /* Hiệu ứng cánh hoa rơi/tim bay */
    .petal {
    position: absolute;
    top: -10%;
    color: #ff69b4;
    font-size: 20px;
    user-select: none;
    pointer-events: none;
    animation: fall linear forwards;
    }

    @keyframes fall {
    to {
    transform: translateY(110vh) rotate(360deg);
    }
    }

    @keyframes popUp {
    from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    .close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 25px;
    cursor: pointer;
    color: #888;
    }
    </style>
</head>
<body>
<div class="container">
    <h1 id="title">Chúc mừng Ngày Quốc tế Phụ nữ 🌷</h1>
    <p id="hint" style="color: #ccc;">(Chạm vào ảnh để có điều bất ngờ)</p>

    <img src="anh5.jpg"
         alt="Bouquet" class="flower-main" id="btnOpen">
</div>

<div class="modal" id="myModal">
    <span class="close-btn" id="btnClose">&times;</span>
    <img src="anh4.jpg" id="girlImg">
    <h2>Chúc Mừng Ngày 8/3 ❤️</h2>
    <p>Gửi đến người phụ nữ tuyệt vời nhất. Chúc mẹ luôn xinh đẹp và hạnh phúc ❤️! Mãi yêu mẹ</p>
</div>

<audio id="bgMusic" loop>
    <source src="nhac (mp3cut.net).mp3" type="audio/mpeg">
</audio>
<script>
    const btnOpen = document.getElementById('btnOpen');
    const modal = document.getElementById('myModal');
    const btnClose = document.getElementById('btnClose');
    const music = document.getElementById('bgMusic');

    // Khi nhấn vào bó hoa
    btnOpen.onclick = function() {
        modal.style.display = "block";
        music.play(); // Bật nhạc
        startFallingEffect(); // Tạo hiệu ứng tim bay
        document.getElementById('hint').style.display = 'none';
    }

    // Đóng popup
    btnClose.onclick = function() {
        modal.style.display = "none";
    }

    // Hàm tạo cánh hoa/trái tim rơi
    function startFallingEffect() {
        setInterval(() => {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            petal.innerHTML = Math.random() > 0.5 ? '🌸' : '❤️';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = (Math.random() * 3 + 2) + 's';
            petal.style.opacity = Math.random();
            document.body.appendChild(petal);

            setTimeout(() => {
                petal.remove();
            }, 5000);
        }, 300);
    }
</script>
</body>
</html>
